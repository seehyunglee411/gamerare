<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임마켓 회원가입 - 빠르고 안전한 가입</title>
  <link rel="icon" href="../../assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <main class="page-main">
    <section class="join-shell">
      <div class="join-card">
        <div class="join-head">
          <a href="../../index.html"><img src="../../assets/images/logo_320x104.png" alt="게임마켓 로고"></a>
          <h1>회원가입</h1>
          <p>다음 양식에 따라 본인 정보를 입력해 주세요</p>
        </div>
        <form class="form-grid">
          <div class="field">
            <label for="user-id">아이디</label>
            <div class="field-row">
              <input class="auth-input" id="user-id" type="text" maxlength="15">
              <span class="count">0 / 15</span>
            </div>
          </div>
          <div class="field">
            <label for="password">비밀번호</label>
            <div class="field-row">
              <input class="auth-input" id="password" type="password" maxlength="16">
              <span class="count">0 / 16</span>
            </div>
          </div>
          <div class="field">
            <label for="password-confirm">비밀번호 확인</label>
            <div class="field-row">
              <input class="auth-input" id="password-confirm" type="password" maxlength="16">
              <span class="count">0 / 16</span>
            </div>
          </div>
          <div class="field">
            <label for="nickname">별명</label>
            <div class="field-row">
              <input class="auth-input" id="nickname" type="text" maxlength="15">
              <span class="count">0 / 15</span>
            </div>
          </div>
          <div class="choice-group">
            <span>어디서 보고 오셨나요?</span>
            <div class="choice-list">
              <label><input type="radio" name="ref"> 네이버</label>
              <label><input type="radio" name="ref"> 구글</label>
              <label><input type="radio" name="ref"> 디스코드</label>
              <label><input type="radio" name="ref"> 페이스북</label>
              <label><input type="radio" name="ref"> 지인추천</label>
              <label><input type="radio" name="ref"> BJ</label>
              <label><input type="radio" name="ref"> 기타</label>
            </div>
          </div>
          <button class="cert-button" type="button">PASS 본인인증확인</button>
          <div class="agreement-box">
            <span><label><input type="checkbox"> 전체 동의하기</label></span>
            <div class="agreement-list">
              <label><input type="checkbox"> 서비스 이용약관 동의(필수) 보기</label>
              <label><input type="checkbox"> 아이템거래 이용약관 동의(필수) 보기</label>
              <label><input type="checkbox"> 개인정보 수집 및 이용약관 동의(필수) 보기</label>
              <label><input type="checkbox"> 마케팅 수신 동의(선택)</label>
            </div>
          </div>
          <button class="auth-button" type="button">가입완료</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
