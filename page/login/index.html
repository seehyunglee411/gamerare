<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임마켓 로그인 - 빠르고 안전한 접속</title>
  <link rel="icon" href="../../assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="login-body">
  <div id="page-progress-bar" style="width: 100%; display: none;"></div>
  <input type="hidden" id="login_member_idx" value="">

  <main id="wrap" class="login-page-wrap">
    <section class="login-wrap" aria-labelledby="login-title">
      <div class="login-top-img">
        <a href="../../index.html" aria-label="게임마켓 홈">
          <img src="../../assets/images/log_in_1.png" alt="게임마켓 로그인 비주얼">
        </a>
      </div>

      <div class="login-card">
        <h1 class="login-title" id="login-title">
          <a href="../../index.html"><img src="../../assets/images/gamemarket_logo.png" alt="게임마켓 로고"></a>
        </h1>
        <div class="login-content">
          <form method="post" id="loginFrm" class="login-form">
            <div class="login-input">
              <input type="text" name="userid" placeholder="아이디" autocomplete="username">
            </div>
            <div class="login-input">
              <input type="password" name="password" placeholder="비밀번호" autocomplete="current-password">
            </div>
            <input type="hidden" name="login_auth_code" id="login_auth_code" value="">
            <button class="login-btn" type="button" id="loginButton">로그인</button>
            <a class="login-link" href="../join/">회원가입</a>
            <a class="login-link" id="find-account" href="./#find-account">아이디/비밀번호 찾기</a>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div class="login-auth-modal" id="loginAuthModal" aria-hidden="true">
    <div class="login-auth-box" role="dialog" aria-modal="true" aria-labelledby="loginAuthTitle">
      <h2 class="login-auth-title" id="loginAuthTitle">휴대폰 인증</h2>
      <p class="login-auth-desc" id="loginAuthDesc">새로운 IP에서 로그인했습니다.<br>인증번호 6자리를 입력해주세요.</p>
      <div class="login-auth-digits" id="loginAuthDigits">
        <input class="login-auth-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="인증번호 첫 번째 자리">
        <input class="login-auth-digit" type="text" inputmode="numeric" maxlength="1" aria-label="인증번호 두 번째 자리">
        <input class="login-auth-digit" type="text" inputmode="numeric" maxlength="1" aria-label="인증번호 세 번째 자리">
        <input class="login-auth-digit" type="text" inputmode="numeric" maxlength="1" aria-label="인증번호 네 번째 자리">
        <input class="login-auth-digit" type="text" inputmode="numeric" maxlength="1" aria-label="인증번호 다섯 번째 자리">
        <input class="login-auth-digit" type="text" inputmode="numeric" maxlength="1" aria-label="인증번호 여섯 번째 자리">
      </div>
      <p class="login-auth-error" id="loginAuthError"></p>
      <div class="login-auth-actions">
        <button type="button" class="login-auth-cancel" id="loginAuthCancel">취소</button>
        <button type="button" class="login-auth-submit" id="loginAuthSubmit">확인</button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('loginAuthModal');
    const digits = Array.from(document.querySelectorAll('.login-auth-digit'));
    const error = document.getElementById('loginAuthError');
    const hiddenCode = document.getElementById('login_auth_code');

    function openLoginAuthModal(message) {
      error.textContent = '';
      if (message) document.getElementById('loginAuthDesc').innerHTML = message;
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
      digits.forEach((digit) => { digit.value = ''; });
      hiddenCode.value = '';
      setTimeout(() => digits[0]?.focus(), 30);
    }

    function closeLoginAuthModal() {
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
      digits.forEach((digit) => { digit.value = ''; });
      hiddenCode.value = '';
      error.textContent = '';
    }

    function getLoginAuthCode() {
      return digits.map((digit) => digit.value).join('');
    }

    function submitLoginAuthCode() {
      const code = getLoginAuthCode();
      if (code.length !== 6) {
        error.textContent = '인증번호 6자리를 입력해주세요.';
        return;
      }
      hiddenCode.value = code;
      closeLoginAuthModal();
    }

    document.getElementById('loginButton').addEventListener('click', () => {
      openLoginAuthModal();
    });

    document.getElementById('loginAuthCancel').addEventListener('click', closeLoginAuthModal);
    document.getElementById('loginAuthSubmit').addEventListener('click', submitLoginAuthCode);

    digits.forEach((digit, index) => {
      digit.addEventListener('input', () => {
        const value = digit.value.replace(/[^0-9]/g, '').slice(-1);
        digit.value = value;
        error.textContent = '';
        if (value && digits[index + 1]) digits[index + 1].focus();
        if (getLoginAuthCode().length === 6) submitLoginAuthCode();
      });

      digit.addEventListener('keydown', (event) => {
        if (event.key === 'Backspace' && !digit.value && digits[index - 1]) {
          digits[index - 1].focus();
        }
      });

      digit.addEventListener('paste', (event) => {
        event.preventDefault();
        const pasted = event.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        if (!pasted) return;
        digits.forEach((target, targetIndex) => { target.value = pasted[targetIndex] || ''; });
        if (pasted.length === 6) submitLoginAuthCode();
        else digits[pasted.length]?.focus();
      });
    });
  </script>
</body>
</html>
